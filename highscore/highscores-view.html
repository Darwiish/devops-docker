<!doctype html>
<html>
  <head>
    <title>Highscores JSON View</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f0f0f0;
        padding: 20px;
      }
      pre {
        background-color: #fff;
        border: 1px solid #ccc;
        padding: 15px;
      }
      a {
        display: inline-block;
        margin-bottom: 15px;
        text-decoration: none;
        color: #333;
        font-weight: bold;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <a href="/">← Back to Highscore Table</a>
    <h2>Highscores (JSON)</h2>
    <pre id="json">Loading...</pre>

    <script>
      async function loadJSON() {
        try {
          const resp = await fetch("/highscores");
          const data = await resp.json();
          document.getElementById("json").innerText = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (err) {
          document.getElementById("json").innerText =
            "Failed to load JSON:\n" + err;
        }
      }
      loadJSON();
    </script>
  </body>
</html>
