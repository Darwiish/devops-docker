version: '3.8'

services:
  mydb:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: my-secret-pw
      MYSQL_DATABASE: mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: 224084343617.dkr.ecr.eu-north-1.amazonaws.com/myapp:latest
    ports:
      - "5002:5002"
    depends_on:
      mydb:
        condition: service_healthy